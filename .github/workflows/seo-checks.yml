name: SEO Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production app
        run: npm run build

      - name: Start app
        run: npm run start > /tmp/avernsys-next.log 2>&1 &

      - name: Wait for app
        run: npx -y wait-on http://127.0.0.1:3000

      - name: Run Lighthouse SEO audits (home, ChapterSys, PrimeRoute)
        run: |
          set -e
          for spec in "home|http://127.0.0.1:3000" "chaptersys|http://127.0.0.1:3000/chaptersys" "primeroute|http://127.0.0.1:3000/primeroute"; do
            label="${spec%%|*}"
            url="${spec#*|}"
            out="lighthouse-seo-${label}.json"
            npx -y lighthouse "$url" --only-categories=seo --chrome-flags='--headless=new --no-sandbox' --output=json --output-path="./$out"
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('./$out','utf8'));const s=r.categories.seo.score;const label='$label';if(s<0.9){console.error('Lighthouse SEO',label,'below threshold:',s);process.exit(1)}console.log('Lighthouse SEO',label+':',s);"
          done

      - name: Run Lighthouse performance audit (home)
        run: npx -y lighthouse http://127.0.0.1:3000 --only-categories=performance --chrome-flags='--headless=new --no-sandbox' --output=json --output-path=./lighthouse-performance.json

      - name: Enforce Lighthouse performance threshold (home)
        run: |
          node -e "const fs = require('fs'); const report = JSON.parse(fs.readFileSync('./lighthouse-performance.json', 'utf8')); const score = report.categories.performance.score; if (score < 0.65) { console.error('Lighthouse performance score below threshold:', score); process.exit(1); } console.log('Lighthouse performance score (home):', score);"
